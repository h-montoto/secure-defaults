name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build a clean distribution ZIP and publish a GitHub Release
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version (strip leading 'v')
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build distribution package
        run: |
          mkdir -p dist/secure-defaults
          rsync -rc --exclude-from=".distignore" ./ dist/secure-defaults/
          cd dist
          zip -r "../secure-defaults-${{ steps.version.outputs.VERSION }}.zip" secure-defaults/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Secure Defaults ${{ steps.version.outputs.VERSION }}"
          files: "secure-defaults-${{ steps.version.outputs.VERSION }}.zip"
          generate_release_notes: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy to WordPress.org SVN
  #
  # Requires two repository secrets:
  #   SVN_USERNAME  — your WordPress.org username
  #   SVN_PASSWORD  — your WordPress.org password (or app password)
  #
  # Set them at: Settings → Secrets and variables → Actions → New repository secret
  # This job is skipped automatically if the secrets are not configured.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-wporg:
    name: WordPress.org SVN
    runs-on: ubuntu-latest
    needs: release
    env:
      SVN_USERNAME: ${{ secrets.SVN_USERNAME }}

    steps:
      - name: Check credentials
        if: env.SVN_USERNAME == ''
        run: |
          echo "SVN_USERNAME secret not configured — skipping WordPress.org deployment."
          echo "Add SVN_USERNAME and SVN_PASSWORD secrets to enable this step."

      - name: Checkout
        if: env.SVN_USERNAME != ''
        uses: actions/checkout@v4

      - name: Deploy to WordPress.org
        if: env.SVN_USERNAME != ''
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: secure-defaults
